name: Deploy React App on VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh
            pnpm --help
            source ~/.bashrc
            cd /var/www/photobank.patrykb.pl/frontend
            git config --local --add safe.directory /var/www/photobank.patrykb.pl/frontend
            git pull origin master
            pnpm install
            pnpm build
